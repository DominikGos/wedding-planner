version: "3.8"

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: oracle
      ORACLE_DATABASE: mydb
      APP_USER: myuser
      APP_USER_PASSWORD: mypassword
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data: